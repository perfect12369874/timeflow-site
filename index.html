<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TimeFlow — iOS 智能时间记录</title>
<style>
  :root {
    --bg: #fafaf8; --text: #1a1a1c; --text-2: #5a5a5e;
    --brand: #16a34a; --line: rgba(0,0,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0b; --text: #f2f4f1; --text-2: rgba(255,255,255,0.6);
      --line: rgba(255,255,255,0.08);
    }
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh; }
  body { display: flex; flex-direction: column; }
  main { max-width: 640px; margin: 0 auto; padding: 80px 24px 60px; flex: 1; text-align: center; }
  .logo-mark { width: 96px; height: 96px; border-radius: 22px;
    background: var(--brand); margin: 0 auto 28px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 40px rgba(22,163,74,0.25); }
  .logo-mark svg { width: 60%; height: 60%; }
  h1 { font-size: 48px; font-weight: 800; margin: 0; letter-spacing: -0.025em; }
  .tag { color: var(--text-2); font-size: 18px; margin: 12px 0 32px; }
  .links { display: flex; gap: 12px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
  .links a { display: inline-flex; align-items: center; gap: 6px;
    padding: 12px 18px; border-radius: 10px;
    background: rgba(22,163,74,0.08); border: 1px solid rgba(22,163,74,0.25);
    color: var(--brand); text-decoration: none; font-weight: 600; font-size: 14px; }
  .links a.alt { background: transparent; border-color: var(--line); color: var(--text-2); }
  footer { text-align: center; padding: 24px;
    color: var(--text-2); font-size: 12px;
    font-family: ui-monospace, 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<main>
  <div class="logo-mark">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="38" fill="none" stroke="#fff" stroke-width="6" opacity="0.4"/>
      <path d="M 50 14 A 36 36 0 0 1 86 50" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="68" y2="38" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="3.5" fill="#fff"/>
    </svg>
  </div>
  <h1>TimeFlow</h1>
  <p class="tag">看见时间真正的去向 · iOS</p>
  <div class="links">
    <a href="#">📱 App Store</a>
    <a href="privacy.html" class="alt">隐私政策</a>
    <a href="support.html" class="alt">支持</a>
  </div>
</main>
<footer>© 2026 TimeFlow · Independent · timeflow.app@gmail.com</footer>
</body>
</html>
